name: Build BlueGriffon Installer (Windows)

on:
  push:
    branches:
      - "exp-mixed-features-ui"
      - "Remote-build-portable-and-installer"
      - "exp-installer-*"
      - "installer-*"
      - "*installer*"
  workflow_dispatch:

jobs:
  build-windows:
    if: github.ref != 'refs/heads/ci-logs'
    runs-on: windows-2022
    steps:
      - name: Checkout BlueGriffon
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve Python path
        shell: powershell
        run: |
          $py = (Get-Command python).Source
          "PYTHON_EXE=$py" >> $env:GITHUB_ENV

      - name: Install Python 2.7
        shell: powershell
        continue-on-error: true
        run: |
          $py2Installed = $false
          Write-Host "Attempting python2 install via Chocolatey..."
          try {
            choco install -y python2 --no-progress
            if ($LASTEXITCODE -eq 0) {
              $py2Installed = $true
            } else {
              Write-Host "Chocolatey python2 install failed with exit code $LASTEXITCODE."
            }
          } catch {
            Write-Host "Chocolatey python2 install threw: $($_.Exception.Message)"
          }

          if (-not $py2Installed) {
            $msiUrl = "https://www.python.org/ftp/python/2.7.18/python-2.7.18.amd64.msi"
            $msiPath = Join-Path $env:RUNNER_TEMP "python-2.7.18.amd64.msi"
            try {
              Write-Host "Downloading Python 2.7.18 MSI from $msiUrl"
              Invoke-WebRequest -Uri $msiUrl -OutFile $msiPath
              Write-Host "Installing Python 2.7.18 MSI..."
              Start-Process msiexec.exe -ArgumentList "/i `"$msiPath`" /qn /norestart" -Wait -NoNewWindow
              if ($LASTEXITCODE -eq 0) {
                $py2Installed = $true
              } else {
                Write-Host "MSI install returned exit code $LASTEXITCODE."
              }
            } catch {
              Write-Host "Python 2.7 MSI fallback failed: $($_.Exception.Message)"
            }
          }

          $wherePy27 = @(where.exe python2.7 2>$null)
          $wherePy2 = @(where.exe python2 2>$null)
          $wherePy27 | ForEach-Object { Write-Host "python2.7: $_" }
          $wherePy2 | ForEach-Object { Write-Host "python2: $_" }

          $candidates = @()
          $candidates += $wherePy27
          $candidates += $wherePy2
          $candidates += @(
            "C:\Python27_18\python.exe",
            "C:\Python27\python.exe",
            "C:\Python27\python2.exe",
            "C:\Python27\python2.7.exe"
          )

          $py2 = $null
          foreach ($candidate in ($candidates | Select-Object -Unique)) {
            if (-not (Test-Path $candidate)) { continue }
            try {
              & $candidate -c "import __builtin__"
              if ($LASTEXITCODE -eq 0) {
                $py2 = $candidate
                break
              }
            } catch {
              Write-Host "Python2 probe failed for $candidate"
            }
          }

          if ($py2) {
            "PYTHON2_EXE=$py2" >> $env:GITHUB_ENV
            Write-Host "Python2 resolved and verified: $py2"
          } else {
            Write-Host "Python2 not found or not compatible (__builtin__ probe failed)."
          }
          $global:LASTEXITCODE = 0

      - name: Install MozillaBuild
        shell: powershell
        continue-on-error: true
        run: |
          if (Test-Path "C:\mozilla-build\start-shell.bat") {
            Write-Host "MozillaBuild already present at C:\mozilla-build."
            exit 0
          }

          $installed = $false
          for ($i = 1; $i -le 3; $i++) {
            Write-Host "Attempt $i: install mozillabuild via Chocolatey"
            choco install -y mozillabuild --no-progress
            if ($LASTEXITCODE -eq 0 -and (Test-Path "C:\mozilla-build\start-shell.bat")) {
              $installed = $true
              break
            }
            Start-Sleep -Seconds (10 * $i)
          }

          if (-not $installed -and (Get-Command winget -ErrorAction SilentlyContinue)) {
            Write-Host "Chocolatey path failed; trying winget fallback."
            winget install --id Mozilla.MozillaBuild -e --accept-package-agreements --accept-source-agreements --silent
            if (Test-Path "C:\mozilla-build\start-shell.bat") {
              $installed = $true
            }
          }

          if (-not $installed) {
            $dlUrl = "https://ftp.mozilla.org/pub/mozilla/libraries/win32/MozillaBuildSetup-Latest.exe"
            $dlPath = Join-Path $env:RUNNER_TEMP "MozillaBuildSetup-Latest.exe"
            for ($i = 1; $i -le 3; $i++) {
              Write-Host "Attempt $i: direct MozillaBuild download/install from $dlUrl"
              try {
                Invoke-WebRequest -Uri $dlUrl -OutFile $dlPath
                if (Test-Path $dlPath) {
                  $size = (Get-Item $dlPath).Length
                  Write-Host "Downloaded installer size: $size"
                }
                Start-Process -FilePath $dlPath -ArgumentList "/S" -Wait -NoNewWindow
              } catch {
                Write-Host "Direct installer attempt failed: $($_.Exception.Message)"
              }
              if (Test-Path "C:\mozilla-build\start-shell.bat") {
                $installed = $true
                break
              }
              Start-Sleep -Seconds (15 * $i)
            }
          }

          if ($installed) {
            Write-Host "MozillaBuild installation verified."
          } else {
            Write-Host "WARNING: MozillaBuild is still missing after choco/winget/direct fallbacks."
          }
          $global:LASTEXITCODE = 0

      - name: Install Yasm
        continue-on-error: true
        run: choco install -y yasm

      - name: Install NSIS
        continue-on-error: true
        run: choco install -y nsis

      - name: Ensure Rust 1.19 toolchain
        shell: powershell
        continue-on-error: true
        run: |
          $cargoBin = Join-Path $env:USERPROFILE ".cargo\bin"
          if (Test-Path $cargoBin) {
            $cargoBin | Out-File -FilePath $env:GITHUB_PATH -Append -Encoding utf8
          }

          if (-not (Get-Command rustup -ErrorAction SilentlyContinue)) {
            Write-Host "rustup not found; installing rustup-init."
            $rustupInit = Join-Path $env:RUNNER_TEMP "rustup-init.exe"
            Invoke-WebRequest -Uri "https://static.rust-lang.org/rustup/dist/x86_64-pc-windows-msvc/rustup-init.exe" -OutFile $rustupInit
            & $rustupInit -y --profile minimal --default-toolchain none
          }

          if (Get-Command rustup -ErrorAction SilentlyContinue) {
            $selected = $null
            $candidates = @("1.19.0-x86_64-pc-windows-msvc", "1.19.0")
            foreach ($tc in $candidates) {
              rustup toolchain install $tc --profile minimal
              if ($LASTEXITCODE -eq 0) {
                $selected = $tc
                break
              }
            }
            rustup toolchain list
            if ($selected) {
              "RUST_TOOLCHAIN=$selected" >> $env:GITHUB_ENV
              Write-Host "Using Rust toolchain candidate: $selected"
            } else {
              Write-Host "Rust 1.19 toolchain install failed; build script will retry/fallback."
            }
          } else {
            Write-Host "rustup still unavailable; build script will fallback to system rust."
          }

      - name: Build BlueGriffon executable
        shell: cmd
        continue-on-error: true
        run: |
          set "LOG=%GITHUB_WORKSPACE%\build.log"
          set "EXIT_FILE=%GITHUB_WORKSPACE%\build-exit.txt"
          echo ==== build start %DATE% %TIME% ==== > "%LOG%"
          echo Workspace: %GITHUB_WORKSPACE% >> "%LOG%"
          dir "%GITHUB_WORKSPACE%" >> "%LOG%" 2>&1
          dir "%GITHUB_WORKSPACE%\.github\scripts" >> "%LOG%" 2>&1
          dir "C:\mozilla-build" >> "%LOG%" 2>&1
          dir "C:\mozilla-build\bin" >> "%LOG%" 2>&1
          dir "C:\mozilla-build\msys2\mingw64\bin" >> "%LOG%" 2>&1
          echo PYTHON_EXE: %PYTHON_EXE% >> "%LOG%"
          echo PYTHON2_EXE: %PYTHON2_EXE% >> "%LOG%"
          echo RUST_TOOLCHAIN: %RUST_TOOLCHAIN% >> "%LOG%"
          echo PATH: %PATH% >> "%LOG%"
          where git >> "%LOG%" 2>&1
          where bash >> "%LOG%" 2>&1
          where python >> "%LOG%" 2>&1
          where python2 >> "%LOG%" 2>&1
          where python2.7 >> "%LOG%" 2>&1
          where makensis >> "%LOG%" 2>&1
          where pkg-config >> "%LOG%" 2>&1
          where make >> "%LOG%" 2>&1
          where mozmake >> "%LOG%" 2>&1
          if not defined PYTHON2_EXE (
            if exist "C:\Python27_18\python.exe" set "PYTHON2_EXE=C:\Python27_18\python.exe"
          )
          if not defined PYTHON2_EXE (
            if exist "C:\Python27\python.exe" set "PYTHON2_EXE=C:\Python27\python.exe"
          )
          if not defined PYTHON2_EXE (
            if exist "C:\Python27\python2.7.exe" set "PYTHON2_EXE=C:\Python27\python2.7.exe"
          )
          if not defined PYTHON2_EXE (
            if exist "C:\Python27\python2.exe" set "PYTHON2_EXE=C:\Python27\python2.exe"
          )
          if not "%PYTHON2_EXE%"=="" (
            echo PYTHON2_EXE fallback applied: %PYTHON2_EXE% >> "%LOG%"
          )

          set "BASH_EXE=C:\mozilla-build\msys2\usr\bin\bash.exe"
          if not exist "%BASH_EXE%" (
            if exist "C:\Program Files\Git\bin\bash.exe" set "BASH_EXE=C:\Program Files\Git\bin\bash.exe"
          )
          if not exist "%BASH_EXE%" (
            if exist "C:\Program Files\Git\usr\bin\bash.exe" set "BASH_EXE=C:\Program Files\Git\usr\bin\bash.exe"
          )
          if not exist "%BASH_EXE%" (
            echo ERROR: no suitable bash.exe found; checked MozillaBuild and Git Bash. >> "%LOG%"
            echo 2 > "%EXIT_FILE%"
            exit /b 0
          )
          echo Using bash: %BASH_EXE% >> "%LOG%"

          set "VSINSTALL="
          set "VCVARS="
          if exist "%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" (
            for /f "usebackq delims=" %%i in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath`) do set "VSINSTALL=%%i"
            echo VSINSTALL from vswhere: %VSINSTALL% >> "%LOG%"
            if not "%VSINSTALL%"=="" set "VCVARS=%VSINSTALL%\VC\Auxiliary\Build\vcvars64.bat"
          ) else (
            echo WARNING: vswhere.exe not found; VS toolchain may be missing. >> "%LOG%"
          )
          if not defined VCVARS (
            if exist "%ProgramFiles%\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat" set "VCVARS=%ProgramFiles%\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
            if exist "%ProgramFiles%\Microsoft Visual Studio\2022\Professional\VC\Auxiliary\Build\vcvars64.bat" set "VCVARS=%ProgramFiles%\Microsoft Visual Studio\2022\Professional\VC\Auxiliary\Build\vcvars64.bat"
            if exist "%ProgramFiles%\Microsoft Visual Studio\2022\Community\VC\Auxiliary\Build\vcvars64.bat" set "VCVARS=%ProgramFiles%\Microsoft Visual Studio\2022\Community\VC\Auxiliary\Build\vcvars64.bat"
            if exist "%ProgramFiles%\Microsoft Visual Studio\2022\BuildTools\VC\Auxiliary\Build\vcvars64.bat" set "VCVARS=%ProgramFiles%\Microsoft Visual Studio\2022\BuildTools\VC\Auxiliary\Build\vcvars64.bat"
          )
          if not defined VCVARS (
            echo WARNING: vcvars64.bat not found; build may fail. >> "%LOG%"
          ) else if not exist "%VCVARS%" (
            echo WARNING: vcvars64.bat not found at %VCVARS%; build may fail. >> "%LOG%"
          ) else (
            echo Using vcvars: %VCVARS% >> "%LOG%"
            call "%VCVARS%" >> "%LOG%" 2>&1
            if defined VCToolsInstallDir (
              set "MSVC_BIN=%VCToolsInstallDir%bin\HostX64\x64"
              echo MSVC_BIN: %MSVC_BIN% >> "%LOG%"
            )
          )

          set "WORKER_LOG=%GITHUB_WORKSPACE%\build-worker.log"
          if exist "%WORKER_LOG%" del /f /q "%WORKER_LOG%" >nul 2>&1
          set "BUILD_LOG=%WORKER_LOG%"
          set "BUILD_WORKDIR=%GITHUB_WORKSPACE%"
          set "BLUEGRIFFON_BUILD_TARGET=installer"
          set "CHERE_INVOKING=1"
          set "MSYSTEM=MINGW64"
          set "MSYS2_PATH_TYPE=inherit"
          echo BLUEGRIFFON_BUILD_TARGET: %BLUEGRIFFON_BUILD_TARGET% >> "%LOG%"
          echo MSYS2_PATH_TYPE: %MSYS2_PATH_TYPE% >> "%LOG%"
          "%BASH_EXE%" -lc "bash .github/scripts/build-bluegriffon-windows.sh"
          set "ERR=%ERRORLEVEL%"
          if "%ERR%"=="0" (
            set "FOUND_EXE="
            for /f "delims=" %%F in ('dir /s /b "%GITHUB_WORKSPACE%\gecko-dev\*griffon*.exe" 2^>nul ^| findstr /i /c:"\\dist\\bin\\"') do set "FOUND_EXE=1"
            if not defined FOUND_EXE (
              echo ERROR: Build returned 0 but no *griffon*.exe under gecko-dev\\**\\dist\\bin\\. >> "%LOG%"
              set "ERR=98"
            )
          )
          if exist "%WORKER_LOG%" (
            echo ==== appended build-worker.log ==== >> "%LOG%"
            type "%WORKER_LOG%" >> "%LOG%" 2>&1
          ) else (
            echo WARNING: build-worker.log not found at %WORKER_LOG% >> "%LOG%"
          )
          echo ==== build end (exit %ERR%) ==== >> "%LOG%"
          echo %ERR% > "%EXIT_FILE%"
          exit /b 0

      - name: Collect executable and installer artifacts
        if: always()
        shell: powershell
        run: |
          $artifactDir = Join-Path $env:GITHUB_WORKSPACE "artifact"
          New-Item -ItemType Directory -Force -Path $artifactDir | Out-Null
          $searchRoot = Join-Path $env:GITHUB_WORKSPACE "gecko-dev"

          $scanFile = Join-Path $env:GITHUB_WORKSPACE "artifact-scan.txt"
          $rootReport = Join-Path $env:GITHUB_WORKSPACE "root-recursive-report.txt"
          "==== artifact scan $(Get-Date -Format o) ====" | Set-Content -Path $scanFile
          "==== root recursive report $(Get-Date -Format o) ====" | Set-Content -Path $rootReport

          $rootsToProbe = @($env:GITHUB_WORKSPACE)
          foreach ($root in $rootsToProbe) {
            Add-Content -Path $rootReport -Value ""
            Add-Content -Path $rootReport -Value ("==== root: {0} ====" -f $root)
            if (-not (Test-Path $root)) {
              Add-Content -Path $rootReport -Value ("MISSING: {0}" -f $root)
              continue
            }

            $dirs = Get-ChildItem -Path $root -Directory -Recurse -ErrorAction SilentlyContinue
            $files = Get-ChildItem -Path $root -File -Recurse -ErrorAction SilentlyContinue
            Add-Content -Path $rootReport -Value ("dir_count: {0}" -f $dirs.Count)
            Add-Content -Path $rootReport -Value ("file_count: {0}" -f $files.Count)

            Add-Content -Path $rootReport -Value "-- directories (recursive) --"
            ($dirs | Select-Object -ExpandProperty FullName | Sort-Object) | Add-Content -Path $rootReport

            Add-Content -Path $rootReport -Value "-- extension histogram (top 60) --"
            $files |
              Group-Object Extension |
              Sort-Object Count -Descending |
              Select-Object -First 60 Name,Count |
              Format-Table -AutoSize |
              Out-String -Width 500 |
              Add-Content -Path $rootReport

            Add-Content -Path $rootReport -Value "-- installer/binary candidates (full recursive) --"
            $files |
              Where-Object { $_.Extension -in @(".exe", ".msi", ".zip", ".7z") } |
              Sort-Object LastWriteTime -Descending |
              Select-Object FullName,Length,LastWriteTime |
              Format-Table -AutoSize |
              Out-String -Width 500 |
              Add-Content -Path $rootReport
          }

          if (Test-Path $searchRoot) {
            $scanCandidates = Get-ChildItem -Path $searchRoot -Recurse -File -ErrorAction SilentlyContinue |
              Where-Object {
                $_.Extension -in @(".exe", ".msi", ".zip", ".7z") -and
                ($_.FullName -match "\\dist\\|\\installer\\|griffon")
              } |
              Sort-Object LastWriteTime -Descending

            $scanCandidates |
              Select-Object -First 500 FullName,Length,LastWriteTime |
              Format-Table -AutoSize |
              Out-String -Width 500 |
              Add-Content -Path $scanFile

            Add-Content -Path $scanFile -Value ""
            Add-Content -Path $scanFile -Value "==== key installer path probe ===="
            $keyPaths = @(
              (Join-Path $searchRoot "opt64\\dist\\install"),
              (Join-Path $searchRoot "opt64\\dist\\install\\sea"),
              (Join-Path $searchRoot "opt64\\dist"),
              (Join-Path $searchRoot "opt64\\bluegriffon\\installer"),
              (Join-Path $searchRoot "opt64\\bluegriffon\\installer\\windows"),
              (Join-Path $searchRoot "opt64\\bluegriffon\\app")
            )
            foreach ($kp in $keyPaths) {
              if (Test-Path $kp) {
                $files = Get-ChildItem -Path $kp -Recurse -File -ErrorAction SilentlyContinue
                Add-Content -Path $scanFile -Value ("FOUND: {0} (files={1})" -f $kp, $files.Count)
                $binaryLike = $files | Where-Object { $_.Extension -in @(".exe", ".msi", ".zip", ".7z") }
                if ($binaryLike.Count -gt 0) {
                  $binaryLike |
                    Sort-Object LastWriteTime -Descending |
                    Select-Object -First 20 FullName,Length,LastWriteTime |
                    Format-Table -AutoSize |
                    Out-String -Width 500 |
                    Add-Content -Path $scanFile
                } else {
                  $files |
                    Sort-Object LastWriteTime -Descending |
                    Select-Object -First 20 FullName,Length,LastWriteTime |
                    Format-Table -AutoSize |
                    Out-String -Width 500 |
                    Add-Content -Path $scanFile
                }
              } else {
                Add-Content -Path $scanFile -Value ("MISSING: {0}" -f $kp)
              }
            }
          } else {
            "search root missing: $searchRoot" | Add-Content -Path $scanFile
          }
          if (Test-Path build.log) {
            Add-Content -Path build.log -Value ""
            Add-Content -Path build.log -Value "==== artifact scan ===="
            Get-Content -Path $scanFile | Add-Content -Path build.log
            Add-Content -Path build.log -Value ""
            Add-Content -Path build.log -Value "==== root recursive report summary ===="
            Get-Content -Path $rootReport | Select-Object -First 220 | Add-Content -Path build.log
          }
          $candidates = @()
          if (Test-Path $searchRoot) {
            $candidates = Get-ChildItem -Path $searchRoot -Recurse -Filter "*griffon*.exe" -ErrorAction SilentlyContinue |
              Where-Object { $_.FullName -match "\\dist\\bin\\" } |
              Sort-Object LastWriteTime -Descending
          }
          if ($candidates.Count -gt 0) {
            $picked = $candidates[0]
            Copy-Item -Path $picked.FullName -Destination (Join-Path $artifactDir $picked.Name) -Force
            Write-Host "Collected executable: $($picked.FullName)"
          } else {
            Write-Host "No executable candidate found under gecko-dev/**/dist/bin."
          }

          $installerDir = Join-Path $artifactDir "installer"
          New-Item -ItemType Directory -Force -Path $installerDir | Out-Null

          $installerCandidates = @()
          if (Test-Path $searchRoot) {
            $installerCandidates = Get-ChildItem -Path $searchRoot -Recurse -File -ErrorAction SilentlyContinue |
              Where-Object {
                $_.Extension -in @(".exe", ".msi") -and
                (
                  $_.FullName -match "(\\dist\\install\\|\\installer\\)" -or
                  ($_.FullName -match "\\dist\\" -and $_.Name -match "(installer|setup)")
                ) -and
                $_.FullName -notmatch "\\dist\\bin\\"
              } |
              Sort-Object LastWriteTime -Descending |
              Select-Object -Unique
          }

          if ($installerCandidates.Count -gt 0) {
            foreach ($candidate in $installerCandidates | Select-Object -First 10) {
              Copy-Item -Path $candidate.FullName -Destination (Join-Path $installerDir $candidate.Name) -Force
            }
            Write-Host "Collected installer candidates:"
            $installerCandidates | Select-Object -First 10 FullName,Length,LastWriteTime | Format-Table -AutoSize
          } else {
            Write-Host "No installer candidates found."
          }
          Get-ChildItem -Path $artifactDir -Recurse -File -ErrorAction SilentlyContinue |
            Select-Object FullName,Length,LastWriteTime | Format-Table -AutoSize

      - name: Upload executable
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bluegriffon-exe-installer
          path: ${{ github.workspace }}\artifact\*.exe
          if-no-files-found: warn

      - name: Upload installer
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bluegriffon-installer
          path: ${{ github.workspace }}\artifact\installer\*
          if-no-files-found: warn

      - name: Show build log tail
        if: always()
        shell: powershell
        run: |
          if (Test-Path build.log) { Get-Content build.log -Tail 200 }

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: ${{ github.workspace }}\build.log

      - name: Upload worker build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-worker-log
          path: |
            ${{ github.workspace }}\build-worker.log
            ${{ github.workspace }}\gecko-dev\build-worker.log
          if-no-files-found: warn

      - name: Upload artifact scan
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact-scan
          path: ${{ github.workspace }}\artifact-scan.txt

      - name: Upload root recursive report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-root-recursive-report
          path: ${{ github.workspace }}\root-recursive-report.txt

      - name: Upload build exit code
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-exit
          path: ${{ github.workspace }}\build-exit.txt

      - name: Commit build log to ci-logs branch
        if: always() && github.event_name == 'push'
        shell: powershell
        run: |
          if (-not (Test-Path build.log)) {
            Write-Host "build.log not found; skipping log commit."
            exit 0
          }

          $tempLog = Join-Path $env:RUNNER_TEMP "build.log"
          Copy-Item build.log $tempLog -Force
          $tempExit = Join-Path $env:RUNNER_TEMP "build-exit.txt"
          $hasExit = Test-Path build-exit.txt
          if ($hasExit) {
            Copy-Item build-exit.txt $tempExit -Force
          }

          git fetch origin ci-logs --depth=1
          if ($LASTEXITCODE -ne 0) {
            git checkout --orphan ci-logs
            git clean -fdx
          } else {
            git checkout -B ci-logs origin/ci-logs
          }

          New-Item -ItemType Directory -Force -Path ci-logs | Out-Null
          Get-Content $tempLog -Tail 2000 | Set-Content ci-logs\build.log
          if ($hasExit) {
            Copy-Item $tempExit ci-logs\build-exit.txt -Force
          }

          $sha = "${{ github.sha }}"
          $runUrl = "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          $branch = "${{ github.ref_name }}"
          Set-Content ci-logs\metadata.txt "source-sha: $sha"
          Add-Content ci-logs\metadata.txt "branch: $branch"
          Add-Content ci-logs\metadata.txt "run: $runUrl"

          git add ci-logs/build.log ci-logs/metadata.txt
          if ($hasExit) {
            git add ci-logs/build-exit.txt
          }
          if (-not (git diff --cached --quiet)) {
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"
            git commit -m "ci logs for $sha [skip ci]"
            git push origin ci-logs
          } else {
            Write-Host "No log changes to commit."
          }

      - name: Fail if build failed
        if: always()
        shell: powershell
        run: |
          if (-not (Test-Path build-exit.txt)) {
            Write-Host "build-exit.txt not found; failing."
            exit 1
          }
          $code = ((Get-Content build-exit.txt | Select-Object -First 1) -as [string]).Trim()
          Write-Host "Build exit code (raw): $code"
          if ($code -match '^[0-9]+$') {
            if ([int]$code -ne 0) { exit 1 }
          } else {
            Write-Host "Non-numeric exit code; failing."
            exit 1
          }
