name: Build BlueGriffon

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout BlueGriffon
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf2.13 build-essential clang \
              libgtk-3-dev libdbus-glib-1-dev yasm unzip zip

      - name: Clone gecko-dev
        run: |
          git clone https://github.com/mozilla/gecko-dev gecko
          cd gecko
          git reset --hard $(cat ../config/gecko_dev_revision.txt)
          patch -p 1 < ../config/gecko_dev_content.patch
          patch -p 1 < ../config/gecko_dev_idl.patch
          ln -sf ../bluegriffon bluegriffon
          ln -sf ../config/mozconfig.ubuntu64 .mozconfig

      - name: Build
        run: |
          cd gecko
          ./mach build

      - name: Package application
        run: |
          cd gecko
          ./mach package

      - name: Build installer
        run: |
          cd gecko
          make -C bluegriffon/installer

      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: BlueGriffon
          path: gecko/opt/dist

