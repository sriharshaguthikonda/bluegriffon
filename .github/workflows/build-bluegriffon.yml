name: Build BlueGriffon (Windows)

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
      - name: Checkout BlueGriffon
        uses: actions/checkout@v4

      - name: Install MozillaBuild
        run: choco install -y mozillabuild

      - name: Build BlueGriffon executable
        shell: cmd
        run: |
          call "C:\mozilla-build\start-shell.bat" -no-interactive -here -c "bash .github/scripts/build-bluegriffon-windows.sh"

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: bluegriffon-exe
          path: gecko-dev/**/dist/bin/bluegriffon.exe
