name: Build BlueGriffon (Windows)

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
      - name: Checkout BlueGriffon
        uses: actions/checkout@v4

      - name: Install MozillaBuild
        run: choco install -y mozillabuild

      - name: Build BlueGriffon executable
        shell: cmd
        run: |
          call "C:\mozilla-build\start-shell.bat" -no-interactive -here -c "bash .github/scripts/build-bluegriffon-windows.sh" > build.log 2>&1

      - name: Upload executable
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bluegriffon-exe
          path: |
            gecko-dev/**/dist/bin/*griffon*.exe

      - name: Show build log tail
        if: always()
        shell: powershell
        run: |
          if (Test-Path build.log) { Get-Content build.log -Tail 200 }

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: build.log
