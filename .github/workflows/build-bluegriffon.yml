name: Build BlueGriffon

on:
  push:
    branches: ["*"]
  pull_request:
    branches: ["*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout BlueGriffon
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential autoconf2.13 clang python3 python3-pip patch rsync

      - name: Clone Firefox sources
        run: |
          git clone https://github.com/mozilla-firefox/firefox.git firefox
          mkdir firefox/bluegriffon
          rsync -a --exclude firefox ./ firefox/bluegriffon/
          cd firefox
          git reset --hard "$(cat bluegriffon/config/firefox_revision.txt)"
          patch -p1 < bluegriffon/config/firefox_content.patch
          patch -p1 < bluegriffon/config/firefox_idl.patch

      - name: Create mozconfig
        run: |
          cp bluegriffon/config/mozconfig.ubuntu64 .mozconfig
        working-directory: firefox

      - name: Build
        run: ./mach build
        working-directory: firefox

      - name: Package
        run: ./mach package
        working-directory: firefox

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bluegriffon-build
          path: firefox/obj*/dist

