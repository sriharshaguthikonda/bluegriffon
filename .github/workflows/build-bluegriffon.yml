name: Build BlueGriffon Installer (Mirror)

on:
  push:
    branches: ["exp/python3-migrated-installer-only"]
  workflow_dispatch:

jobs:
  build-windows:
    if: github.ref != 'refs/heads/ci-logs'
    runs-on: windows-2022
    steps:
      - name: Checkout BlueGriffon
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Resolve Python path
        shell: powershell
        run: |
          $py = (Get-Command python).Source
          "PYTHON_EXE=$py" >> $env:GITHUB_ENV

      - name: Pin Rust toolchain 1.19.0
        shell: powershell
        run: |
          $toolchain = "1.19.0-x86_64-pc-windows-msvc"
          if (-not (Get-Command rustup -ErrorAction SilentlyContinue)) {
            choco install -y rustup.install --no-progress
            $env:PATH += ";$env:USERPROFILE\.cargo\bin"
          }
          rustup set profile minimal
          rustup toolchain install $toolchain

          $rustc = (& rustup which --toolchain $toolchain rustc).Trim()
          if (-not (Test-Path $rustc)) {
            throw "rustc not found for toolchain ${toolchain}: ${rustc}"
          }
          $cargo = Join-Path (Split-Path -Parent $rustc) "cargo.exe"
          if (-not (Test-Path $cargo)) {
            $cargo = (& rustup which --toolchain $toolchain cargo).Trim()
          }
          if (-not (Test-Path $cargo)) {
            throw "cargo not found for toolchain ${toolchain}: ${cargo}"
          }

          & $rustc --version
          & $cargo --version
          "RUSTUP_TOOLCHAIN=$toolchain" >> $env:GITHUB_ENV
          "RUSTC=$rustc" >> $env:GITHUB_ENV
          "CARGO=$cargo" >> $env:GITHUB_ENV

      - name: Install Python 2.7
        shell: powershell
        continue-on-error: true
        run: |
          $py2Installed = $false
          Write-Host "Attempting python2 install via Chocolatey..."
          try {
            choco install -y python2 --no-progress
            if ($LASTEXITCODE -eq 0) {
              $py2Installed = $true
            } else {
              Write-Host "Chocolatey python2 install failed with exit code $LASTEXITCODE."
            }
          } catch {
            Write-Host "Chocolatey python2 install threw: $($_.Exception.Message)"
          }

          if (-not $py2Installed) {
            $msiUrl = "https://www.python.org/ftp/python/2.7.18/python-2.7.18.amd64.msi"
            $msiPath = Join-Path $env:RUNNER_TEMP "python-2.7.18.amd64.msi"
            try {
              Write-Host "Downloading Python 2.7.18 MSI from $msiUrl"
              Invoke-WebRequest -Uri $msiUrl -OutFile $msiPath
              Write-Host "Installing Python 2.7.18 MSI..."
              Start-Process msiexec.exe -ArgumentList "/i `"$msiPath`" /qn /norestart" -Wait -NoNewWindow
              if ($LASTEXITCODE -eq 0) {
                $py2Installed = $true
              } else {
                Write-Host "MSI install returned exit code $LASTEXITCODE."
              }
            } catch {
              Write-Host "Python 2.7 MSI fallback failed: $($_.Exception.Message)"
            }
          }

          $candidates = @()
          $candidates += @(
            "C:\Python27\python.exe",
            "C:\Python27_18\python.exe",
            "C:\Python27\python2.exe",
            "C:\Python27\python2.7.exe"
          )
          $py2Cmd = Get-Command python2 -ErrorAction SilentlyContinue
          if ($py2Cmd) {
            $candidates += $py2Cmd.Source
            Write-Host "python2 cmd: $($py2Cmd.Source)"
          }
          $py27Cmd = Get-Command python2.7 -ErrorAction SilentlyContinue
          if ($py27Cmd) {
            $candidates += $py27Cmd.Source
            Write-Host "python2.7 cmd: $($py27Cmd.Source)"
          }

          $py2 = $null
          foreach ($candidate in ($candidates | Select-Object -Unique)) {
            if (-not (Test-Path $candidate)) { continue }
            try {
              & $candidate -c "import __builtin__"
              if ($LASTEXITCODE -eq 0) {
                $py2 = $candidate
                break
              }
            } catch {
              Write-Host "Python2 probe failed for $candidate"
            }
          }

          if ($py2) {
            "PYTHON2_EXE=$py2" >> $env:GITHUB_ENV
            Write-Host "Python2 resolved and verified: $py2"
          } else {
            Write-Host "Python2 not found or not compatible (__builtin__ probe failed)."
          }
          $global:LASTEXITCODE = 0

      - name: Install MozillaBuild
        run: choco install -y mozillabuild

      - name: Install Yasm
        continue-on-error: true
        run: choco install -y yasm

      - name: Install Inno Setup
        run: choco install -y innosetup --no-progress

      - name: Build BlueGriffon executable
        shell: cmd
        continue-on-error: true
        run: |
          set "LOG=%GITHUB_WORKSPACE%\build.log"
          set "EXIT_FILE=%GITHUB_WORKSPACE%\build-exit.txt"
          echo ==== build start %DATE% %TIME% ==== > "%LOG%"
          echo Workspace: %GITHUB_WORKSPACE% >> "%LOG%"
          dir "%GITHUB_WORKSPACE%" >> "%LOG%" 2>&1
          dir "%GITHUB_WORKSPACE%\.github\scripts" >> "%LOG%" 2>&1
          dir "C:\mozilla-build" >> "%LOG%" 2>&1
          dir "C:\mozilla-build\bin" >> "%LOG%" 2>&1
          dir "C:\mozilla-build\msys2\mingw64\bin" >> "%LOG%" 2>&1
          echo PYTHON_EXE: %PYTHON_EXE% >> "%LOG%"
          echo PYTHON3_EXE: %PYTHON3_EXE% >> "%LOG%"
          echo RUSTUP_TOOLCHAIN: %RUSTUP_TOOLCHAIN% >> "%LOG%"
          echo RUSTC: %RUSTC% >> "%LOG%"
          echo CARGO: %CARGO% >> "%LOG%"
          echo PATH: %PATH% >> "%LOG%"
          where git >> "%LOG%" 2>&1
          where bash >> "%LOG%" 2>&1
          where python >> "%LOG%" 2>&1
          where python3 >> "%LOG%" 2>&1
          where pkg-config >> "%LOG%" 2>&1
          where make >> "%LOG%" 2>&1
          where mozmake >> "%LOG%" 2>&1
          if not exist "C:\mozilla-build\msys2\usr\bin\bash.exe" (
            echo ERROR: MozillaBuild bash.exe not found. >> "%LOG%"
            echo 2 > "%EXIT_FILE%"
            exit /b 0
          )
          echo Using bash: C:\mozilla-build\msys2\usr\bin\bash.exe >> "%LOG%"

          set "VSINSTALL="
          set "VCVARS="
          if exist "%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" (
            for /f "usebackq delims=" %%i in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath`) do set "VSINSTALL=%%i"
            echo VSINSTALL from vswhere: %VSINSTALL% >> "%LOG%"
            if not "%VSINSTALL%"=="" set "VCVARS=%VSINSTALL%\VC\Auxiliary\Build\vcvars64.bat"
          ) else (
            echo WARNING: vswhere.exe not found; VS toolchain may be missing. >> "%LOG%"
          )
          if not defined VCVARS (
            if exist "%ProgramFiles%\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat" set "VCVARS=%ProgramFiles%\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
            if exist "%ProgramFiles%\Microsoft Visual Studio\2022\Professional\VC\Auxiliary\Build\vcvars64.bat" set "VCVARS=%ProgramFiles%\Microsoft Visual Studio\2022\Professional\VC\Auxiliary\Build\vcvars64.bat"
            if exist "%ProgramFiles%\Microsoft Visual Studio\2022\Community\VC\Auxiliary\Build\vcvars64.bat" set "VCVARS=%ProgramFiles%\Microsoft Visual Studio\2022\Community\VC\Auxiliary\Build\vcvars64.bat"
            if exist "%ProgramFiles%\Microsoft Visual Studio\2022\BuildTools\VC\Auxiliary\Build\vcvars64.bat" set "VCVARS=%ProgramFiles%\Microsoft Visual Studio\2022\BuildTools\VC\Auxiliary\Build\vcvars64.bat"
          )
          if not defined VCVARS (
            echo WARNING: vcvars64.bat not found; build may fail. >> "%LOG%"
          ) else if not exist "%VCVARS%" (
            echo WARNING: vcvars64.bat not found at %VCVARS%; build may fail. >> "%LOG%"
          ) else (
            echo Using vcvars: %VCVARS% >> "%LOG%"
            call "%VCVARS%" >> "%LOG%" 2>&1
            if defined VCToolsInstallDir (
              set "MSVC_BIN=%VCToolsInstallDir%bin\HostX64\x64"
              echo MSVC_BIN: %MSVC_BIN% >> "%LOG%"
            )
          )

          set "BUILD_LOG=%LOG%"
          set "BUILD_WORKDIR=%GITHUB_WORKSPACE%"
          set "CHERE_INVOKING=1"
          set "MSYSTEM=MINGW64"
          set "MSYS2_PATH_TYPE=inherit"
          echo MSYS2_PATH_TYPE: %MSYS2_PATH_TYPE% >> "%LOG%"
          "C:\mozilla-build\msys2\usr\bin\bash.exe" -lc "bash .github/scripts/build-bluegriffon-windows.sh"
          set "ERR=%ERRORLEVEL%"
          echo ==== build end (exit %ERR%) ==== >> "%LOG%"
          echo %ERR% > "%EXIT_FILE%"
          exit /b 0

      - name: Build installer artifact
        if: always()
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $artifactDir = Join-Path $env:GITHUB_WORKSPACE "artifact"
          $runtimeDir = Join-Path $artifactDir "runtime"
          $installerDir = Join-Path $artifactDir "installer"
          New-Item -ItemType Directory -Force -Path $artifactDir,$runtimeDir,$installerDir | Out-Null
          $searchRoot = Join-Path $env:GITHUB_WORKSPACE "gecko-dev"

          $scanFile = Join-Path $env:GITHUB_WORKSPACE "artifact-scan.txt"
          $rootReport = Join-Path $env:GITHUB_WORKSPACE "root-recursive-report.txt"
          "==== installer artifact scan $(Get-Date -Format o) ====" | Set-Content -Path $scanFile
          "==== bounded root report $(Get-Date -Format o) ====" | Set-Content -Path $rootReport

          Add-Content -Path $rootReport -Value ("workspace: {0}" -f $env:GITHUB_WORKSPACE)
          if (Test-Path $env:GITHUB_WORKSPACE) {
            Add-Content -Path $rootReport -Value "-- workspace top-level entries --"
            Get-ChildItem -Path $env:GITHUB_WORKSPACE -Force -ErrorAction SilentlyContinue |
              Select-Object Mode,Length,LastWriteTime,FullName |
              Sort-Object FullName |
              Format-Table -AutoSize |
              Out-String -Width 500 |
              Add-Content -Path $rootReport
          }

          $candidateRoots = @(
            (Join-Path $searchRoot "opt64\\dist\\bin"),
            (Join-Path $searchRoot "dist\\bin")
          ) | Where-Object { Test-Path $_ } | Select-Object -Unique

          Add-Content -Path $scanFile -Value ""
          Add-Content -Path $scanFile -Value "==== candidate runtime roots ===="
          if ($candidateRoots.Count -eq 0) {
            Add-Content -Path $scanFile -Value ("No runtime roots found under {0}" -f $searchRoot)
          } else {
            foreach ($root in $candidateRoots) {
              Add-Content -Path $scanFile -Value ("root: {0}" -f $root)
              Get-ChildItem -Path $root -File -ErrorAction SilentlyContinue |
                Where-Object { $_.Extension -in @(".exe", ".dll", ".xpt", ".manifest", ".ini") } |
                Sort-Object LastWriteTime -Descending |
                Select-Object -First 120 FullName,Length,LastWriteTime |
                Format-Table -AutoSize |
                Out-String -Width 500 |
              Add-Content -Path $scanFile
            }
          }

          if ($candidateRoots.Count -eq 0) {
            throw "No runtime roots found under $searchRoot."
          }

          $candidates = @()
          foreach ($root in $candidateRoots) {
            $candidates += Get-ChildItem -Path $root -File -Filter "*griffon*.exe" -ErrorAction SilentlyContinue
          }
          $candidates = $candidates | Sort-Object LastWriteTime -Descending

          if ($candidates.Count -gt 0) {
            $picked = $candidates[0]
            $binDir = Split-Path -Parent $picked.FullName

            if (Test-Path $runtimeDir) {
              Remove-Item -Path $runtimeDir -Recurse -Force -ErrorAction SilentlyContinue
            }
            New-Item -ItemType Directory -Force -Path $runtimeDir | Out-Null

            $copyLog = Join-Path $env:GITHUB_WORKSPACE "portable-copy.log"
            if (Test-Path $copyLog) { Remove-Item -Path $copyLog -Force -ErrorAction SilentlyContinue }
            $null = robocopy $binDir $runtimeDir *.* /E /R:1 /W:1 /XJ /SL /COPY:DAT /DCOPY:DAT /NFL /NDL /NP /MT:8 /LOG:$copyLog
            $robocopyExit = $LASTEXITCODE
            Add-Content -Path $scanFile -Value ("robocopy exit code: {0}" -f $robocopyExit)
            if ($robocopyExit -gt 7) {
              throw "Runtime copy failed with robocopy exit code $robocopyExit"
            }
            # Robocopy returns 0-7 for success/acceptable states; clear it so the step exit code stays green.
            $global:LASTEXITCODE = 0

            $isccCandidates = @(
              "$env:ProgramFiles(x86)\Inno Setup 6\ISCC.exe",
              "$env:ProgramFiles\Inno Setup 6\ISCC.exe"
            )
            $iscc = $isccCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1
            if (-not $iscc) {
              throw "ISCC.exe not found. Inno Setup install failed."
            }

            $issPath = Join-Path $env:GITHUB_WORKSPACE "ci-installer.iss"
            $appExe = $picked.Name
            $runtimeEscaped = $runtimeDir.Replace("\", "\\")
            $installerEscaped = $installerDir.Replace("\", "\\")
            $iss = @"
[Setup]
AppId={{A9015334-10BE-4D64-A776-203336EFE806}
AppName=BlueGriffon
AppVersion=3.1-dev
DefaultDirName={autopf}\BlueGriffon
DefaultGroupName=BlueGriffon
AllowNoIcons=yes
OutputDir=$installerEscaped
OutputBaseFilename=bluegriffon-installer
Compression=lzma2
SolidCompression=yes
ArchitecturesInstallIn64BitMode=x64compatible
WizardStyle=modern

[Languages]
Name: "english"; MessagesFile: "compiler:Default.isl"

[Tasks]
Name: "desktopicon"; Description: "{cm:CreateDesktopIcon}"; GroupDescription: "{cm:AdditionalIcons}"; Flags: unchecked

[Files]
Source: "$runtimeEscaped\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs

[Icons]
Name: "{group}\BlueGriffon"; Filename: "{app}\$appExe"
Name: "{group}\{cm:UninstallProgram,BlueGriffon}"; Filename: "{uninstallexe}"
Name: "{commondesktop}\BlueGriffon"; Filename: "{app}\$appExe"; Tasks: desktopicon

[Run]
Filename: "{app}\$appExe"; Description: "{cm:LaunchProgram,BlueGriffon}"; Flags: nowait postinstall skipifsilent
"@
            Set-Content -Path $issPath -Encoding ASCII -Value $iss

            & $iscc $issPath
            if ($LASTEXITCODE -ne 0) {
              throw "ISCC failed with exit code $LASTEXITCODE"
            }

            Add-Content -Path $scanFile -Value ""
            Add-Content -Path $scanFile -Value "==== installer output files ===="
            Get-ChildItem -Path $installerDir -File -ErrorAction SilentlyContinue |
              Sort-Object FullName |
              Select-Object FullName,Length,LastWriteTime |
              Format-Table -AutoSize |
              Out-String -Width 500 |
              Add-Content -Path $scanFile

            Write-Host "Collected executable: $($picked.FullName)"
            Write-Host "Prepared runtime from: $binDir"
            Write-Host "Built installer(s) into: $installerDir"
          } else {
            Write-Host "No executable candidate found under gecko-dev/**/dist/bin."
            throw "Cannot build installer without a built executable."
          }

          if (Test-Path build.log) {
            Add-Content -Path build.log -Value ""
            Add-Content -Path build.log -Value "==== artifact scan (bounded) ===="
            Get-Content -Path $scanFile | Select-Object -First 600 | Add-Content -Path build.log
            Add-Content -Path build.log -Value ""
            Add-Content -Path build.log -Value "==== root report (bounded) ===="
            Get-Content -Path $rootReport | Select-Object -First 250 | Add-Content -Path build.log
          }

          Get-ChildItem -Path $artifactDir -Recurse -File -ErrorAction SilentlyContinue |
            Select-Object FullName,Length,LastWriteTime | Format-Table -AutoSize
      - name: Upload installer
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bluegriffon-installer
          path: ${{ github.workspace }}\artifact\installer\*.exe
          if-no-files-found: warn

      - name: Show build log tail
        if: always()
        shell: powershell
        run: |
          if (Test-Path build.log) { Get-Content build.log -Tail 200 }
          if (Test-Path build-worker.log) {
            Write-Host "==== build-worker.log tail ===="
            Get-Content build-worker.log -Tail 200
          } elseif (Test-Path gecko-dev\build-worker.log) {
            Write-Host "==== gecko-dev\\build-worker.log tail ===="
            Get-Content gecko-dev\build-worker.log -Tail 200
          }

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: ${{ github.workspace }}\build.log

      - name: Upload worker build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-worker-log
          path: |
            ${{ github.workspace }}\build-worker.log
            ${{ github.workspace }}\gecko-dev\build-worker.log
          if-no-files-found: warn

      - name: Upload artifact scan
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact-scan
          path: ${{ github.workspace }}\artifact-scan.txt
          if-no-files-found: warn

      - name: Upload root recursive report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-root-recursive-report
          path: ${{ github.workspace }}\root-recursive-report.txt
          if-no-files-found: warn

      - name: Upload build exit code
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-exit
          path: ${{ github.workspace }}\build-exit.txt

      - name: Commit build log to ci-logs branch
        if: always() && github.event_name == 'push'
        shell: powershell
        run: |
          if (-not (Test-Path build.log)) {
            Write-Host "build.log not found; skipping log commit."
            exit 0
          }

          $tempLog = Join-Path $env:RUNNER_TEMP "build.log"
          Copy-Item build.log $tempLog -Force
          $tempWorker = Join-Path $env:RUNNER_TEMP "build-worker.log"
          $hasWorker = $false
          if (Test-Path build-worker.log) {
            Copy-Item build-worker.log $tempWorker -Force
            $hasWorker = $true
          } elseif (Test-Path gecko-dev\build-worker.log) {
            Copy-Item gecko-dev\build-worker.log $tempWorker -Force
            $hasWorker = $true
          }
          $tempExit = Join-Path $env:RUNNER_TEMP "build-exit.txt"
          $hasExit = Test-Path build-exit.txt
          if ($hasExit) {
            Copy-Item build-exit.txt $tempExit -Force
          }

          $tempWorktree = Join-Path $env:RUNNER_TEMP "ci-logs-worktree"
          if (Test-Path $tempWorktree) {
            Remove-Item -Path $tempWorktree -Recurse -Force -ErrorAction SilentlyContinue
          }

          git fetch origin ci-logs --depth=1
          $ciLogsExists = ($LASTEXITCODE -eq 0)
          if ($ciLogsExists) {
            git worktree add --detach $tempWorktree origin/ci-logs
          } else {
            git worktree add --detach $tempWorktree HEAD
          }
          if ($LASTEXITCODE -ne 0) {
            Write-Host "WARNING: Unable to prepare ci-logs worktree; skipping ci-logs commit."
            exit 0
          }

          Push-Location $tempWorktree
          try {
            if ($ciLogsExists) {
              git checkout -B ci-logs origin/ci-logs
            } else {
              git checkout --orphan ci-logs
              git rm -rf . --ignore-unmatch
            }

            New-Item -ItemType Directory -Force -Path ci-logs | Out-Null
            Get-Content $tempLog -Tail 2000 | Set-Content ci-logs\build.log
            if ($hasWorker) {
              Add-Content -Path ci-logs\build.log -Value ""
              Add-Content -Path ci-logs\build.log -Value "==== worker build log tail ===="
              Get-Content $tempWorker -Tail 5000 | Add-Content -Path ci-logs\build.log
            }
            if ($hasExit) {
              Copy-Item $tempExit ci-logs\build-exit.txt -Force
            } elseif (Test-Path ci-logs\build-exit.txt) {
              Remove-Item ci-logs\build-exit.txt -Force
            }

            $sha = "${{ github.sha }}"
            $runUrl = "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            $branch = "${{ github.ref_name }}"
            Set-Content ci-logs\metadata.txt "source-sha: $sha"
            Add-Content ci-logs\metadata.txt "branch: $branch"
            Add-Content ci-logs\metadata.txt "run: $runUrl"

            git add ci-logs/build.log ci-logs/metadata.txt
            if ($hasExit) {
              git add ci-logs/build-exit.txt
            }

            if (-not (git diff --cached --quiet)) {
              git config user.name "github-actions"
              git config user.email "github-actions@github.com"
              git commit -m "ci logs for $sha [skip ci]"
              git push origin HEAD:ci-logs
              if ($LASTEXITCODE -ne 0) {
                Write-Host "WARNING: Failed to push ci-logs update; continuing."
              }
            } else {
              Write-Host "No log changes to commit."
            }
          }
          finally {
            Pop-Location
            git worktree remove $tempWorktree --force | Out-Null
          }

      - name: Fail if build failed
        if: always()
        shell: powershell
        run: |
          if (-not (Test-Path build-exit.txt)) {
            Write-Host "build-exit.txt not found; failing."
            exit 1
          }
          $code = ((Get-Content build-exit.txt | Select-Object -First 1) -as [string]).Trim()
          Write-Host "Build exit code (raw): $code"
          if ($code -match '^[0-9]+$') {
            if ([int]$code -ne 0) { exit 1 }
          } else {
            Write-Host "Non-numeric exit code; failing."
            exit 1
          }
